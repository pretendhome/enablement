# Open Badges 3.0 Module-Level Badge Schema
# Palette Developer Enablement & Certification System
# Standard: Open Badges 3.0 / W3C Verifiable Credentials v2.0

# This schema defines the structure for module-level badges.
# Module-level badges are awarded for completing individual modules within a certification track.

id: "urn:uuid:{{MODULE_UUID}}"
type: ["VerifiableCredential", "OpenBadgeCredential"]
"@context": [
  "https://www.w3.org/ns/credentials/v2",
  "https://purl.imsglobal.org/spec/ob/v3p0/context-3.0.3.json"
]
issuer: {
  id: "did:web:palette.dev",
  type: ["Profile"],
  name: "Palette Developer Enablement",
  url: "https://palette.dev",
  email: "certifications@palette.dev",
  description: "Palette Developer Enablement & Certification System — Building the next generation of enterprise AI developers."
}
name: "Palette Certified Developer — {{MODULE_NAME}}"
description: "Awarded to developers who have demonstrated competency in the {{MODULE_NAME}} module. This badge signifies the ability to apply the module's core principles and is recognized by industry employers."
validFrom: "{{ISSUE_DATE}}"
credentialSubject: {
  id: "did:example:recipient123",
  type: ["AchievementSubject"],
  achievement: {
    id: "https://palette.dev/achievements/{{MODULE_ID}}",
    type: ["Achievement"],
    name: "Palette Certified Developer — {{MODULE_NAME}}",
    description: "Demonstrated competency in the {{MODULE_NAME}} module, signifying the ability to apply the module's core principles.",
    criteria: {
      narrative: "Complete all learning objectives in the {{MODULE_NAME}} module and pass the assessment with a score of 70% or higher, demonstrating competency in the module's core competencies."
    },
    alignment: [
      # Alignment to the Palette Skills Framework
      # Each alignment maps to a specific skill or competency
      {
        type: ["Alignment"],
        targetName: "{{SKILL_NAME}}",
        targetUrl: "https://palette.dev/skills/{{SKILL_ID}}",
        targetFramework: "Palette Skills Framework",
        targetCode: "{{SKILL_CODE}}",
        targetType: "CFItem"
      }
    ],
    image: {
      id: "https://palette.dev/images/badges/{{MODULE_ID}}.png",
      type: "Image"
    }
  }
}
validityPeriod: "P2Y"
evidenceRequirements: [
  {
    id: "https://palette.dev/evidence/module-completion",
    type: ["Evidence"],
    name: "Module Completion",
    description: "Evidence of completing all learning objectives in the {{MODULE_NAME}} module and passing the assessment with a score of 70% or higher.",
    genre: "Assessment",
    audience: ["https://schema.org/PotentialAction"]
  },
  {
    id: "https://palette.dev/evidence/artifact-submission",
    type: ["Evidence"],
    name: "Artifact Submission",
    description: "Evidence of submitting and passing the required artifacts for the {{MODULE_NAME}} module.",
    genre: "Portfolio",
    audience: ["https://schema.org/PotentialAction"]
  }
]
termsOfUse: [
  {
    type: ["TermsOfUse"],
    id: "https://palette.dev/terms/certification",
    name: "Palette Certification Terms of Use",
    description: "Terms governing the use and display of Palette certification badges."
  }
]
related: [
  {
    id: "https://palette.dev/curriculum/modules/{{MODULE_ID}}",
    type: ["Related"],
    name: "{{MODULE_NAME}} Module",
    description: "Learn about the {{MODULE_NAME}} module and its requirements."
  },
  {
    id: "https://palette.dev/certification/journey",
    type: ["Related"],
    name: "Palette Certification Journey",
    description: "Learn about the next steps in the Palette certification journey."
  }
]
# End of Module-Level Badge Schema