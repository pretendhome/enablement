# Open Badges 3.0 Track-Level Credential Schema
# Palette Developer Enablement & Certification System
# Standard: Open Badges 3.0 / W3C Verifiable Credentials v2.0

# This schema defines the structure for track-level credentials.
# Track-level credentials are awarded for completing all modules within a certification track.
# They reference the module-level badges earned by the recipient.

id: "urn:uuid:{{TRACK_UUID}}"
type: ["VerifiableCredential", "OpenBadgeCredential"]
@context: [
  "https://www.w3.org/ns/credentials/v2",
  "https://purl.imsglobal.org/spec/ob/v3p0/context-3.0.3.json"
]
issuer: {
  id: "did:web:palette.dev",
  type: ["Profile"],
  name: "Palette Developer Enablement",
  url: "https://palette.dev",
  email: "certifications@palette.dev",
  description: "Palette Developer Enablement & Certification System — Building the next generation of enterprise AI developers."
}
name: "Palette Certified {{TRACK_NAME}} Developer"
description: "Awarded to developers who have demonstrated competency across all modules in the {{TRACK_NAME}} track. This credential signifies the ability to apply the track's core principles and is highly recognized by industry employers."
validFrom: "{{ISSUE_DATE}}"
credentialSubject: {
  id: "did:example:recipient123",
  type: ["AchievementSubject"],
  achievement: {
    id: "https://palette.dev/achievements/{{TRACK_ID}}",
    type: ["Achievement"],
    name: "Palette Certified {{TRACK_NAME}} Developer",
    description: "Demonstrated competency across all modules in the {{TRACK_NAME}} track, signifying the ability to apply the track's core principles.",
    criteria: {
      narrative: "Complete all modules in the {{TRACK_NAME}} track and pass the assessments with a score of 70% or higher, demonstrating competency in the track's core competencies."
    },
    alignment: [
      # Alignment to the Palette Skills Framework
      # Each alignment maps to a specific skill or competency
      {
        type: ["Alignment"],
        targetName: "{{TRACK_SKILL_NAME}}",
        targetUrl: "https://palette.dev/skills/{{TRACK_SKILL_ID}}",
        targetFramework: "Palette Skills Framework",
        targetCode: "{{TRACK_SKILL_CODE}}",
        targetType: "CFItem"
      }
    ],
    image: {
      id: "https://palette.dev/images/credentials/{{TRACK_ID}}.png",
      type: "Image"
    }
  }
}
validityPeriod: "P2Y"
evidenceRequirements: [
  {
    id: "https://palette.dev/evidence/track-completion",
    type: ["Evidence"],
    name: "Track Completion",
    description: "Evidence of completing all modules in the {{TRACK_NAME}} track and passing the assessments with a score of 70% or higher.",
    genre: "Assessment",
    audience: ["https://schema.org/PotentialAction"]
  },
  {
    id: "https://palette.dev/evidence/portfolio-review",
    type: ["Evidence"],
    name: "Portfolio Review",
    description: "Evidence of submitting and passing a portfolio review of work products for the {{TRACK_NAME}} track.",
    genre: "Portfolio",
    audience: ["https://schema.org/PotentialAction"]
  }
]
relatedBadges: [
  # List of module-level badges that contribute to this track credential
  # Each badge is referenced by its achievement ID
  {
    id: "https://palette.dev/achievements/{{MODULE_1_ID}}",
    type: ["Related"],
    name: "{{MODULE_1_NAME}} Badge",
    description: "Module-level badge for {{MODULE_1_NAME}}."
  },
  {
    id: "https://palette.dev/achievements/{{MODULE_2_ID}}",
    type: ["Related"],
    name: "{{MODULE_2_NAME}} Badge",
    description: "Module-level badge for {{MODULE_2_NAME}}."
  }
  # Additional modules as needed
]
termsOfUse: [
  {
    type: ["TermsOfUse"],
    id: "https://palette.dev/terms/certification",
    name: "Palette Certification Terms of Use",
    description: "Terms governing the use and display of Palette certification badges."
  }
]
related: [
  {
    id: "https://palette.dev/certification/tracks/{{TRACK_ID}}",
    type: ["Related"],
    name: "{{TRACK_NAME}} Track",
    description: "Learn about the {{TRACK_NAME}} track and its requirements."
  },
  {
    id: "https://palette.dev/certification/journey",
    type: ["Related"],
    name: "Palette Certification Journey",
    description: "Learn about the next steps in the Palette certification journey."
  }
]
# End of Track-Level Credential Schema